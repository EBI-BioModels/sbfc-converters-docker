# Redirect all HTTP traffic to HTTPS
<VirtualHost *:80>
    ServerName  biomodels.org
    ServerAlias www.biomodels.org

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName  biomodels.org
    ServerAlias www.biomodels.org

    # --- SSL (Let's Encrypt) ---
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/biomodels.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/biomodels.org/privkey.pem

    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # --- Reverse proxy settings ---
    ProxyRequests     Off
    ProxyPreserveHost On

    # Converters service — Docker container listening on localhost:8090
    # Tomcat context path is /tools/converters (set by tools#converters.xml).
    # This block MUST appear before the catch-all ProxyPass below.
    ProxyPass        /tools/converters http://localhost:8090/tools/converters
    ProxyPassReverse /tools/converters http://localhost:8090/tools/converters

    # Main biomodels.org service
    # Replace localhost:MAIN_PORT with wherever the main service listens.
    ProxyPass        / http://localhost:MAIN_PORT/
    ProxyPassReverse / http://localhost:MAIN_PORT/

    # --- Logging ---
    ErrorLog  ${APACHE_LOG_DIR}/biomodels.org-error.log
    CustomLog ${APACHE_LOG_DIR}/biomodels.org-access.log combined
</VirtualHost>
